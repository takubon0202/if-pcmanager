name: PC Data Research & Update

on:
  # 手動実行
  workflow_dispatch:

  # 毎朝7時(JST = UTC 22:00前日) に自動実行 ※ 初期は無効化
  # schedule:
  #   - cron: '0 22 * * *'

jobs:
  research-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run PC data research (all categories)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/research-pc-data.mjs

      - name: Type check
        run: npx tsc --noEmit

      - name: Build check
        run: npm run build

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/
          git commit -m "chore: PCデータ定期更新 ($(date +%Y-%m-%d))

          Gemini API (Google Search grounding) による自動リサーチ
          更新対象:
          - ノートPCデータベース
          - 型番カタログ
          - CPUスコアデータ
          - 周辺機器カタログ（モニター/キーボード/マウス/ヘッドセット/Webカメラ）
          - 自作PCパーツ（CPU/GPU/メモリ/マザーボード/ストレージ/電源/ケース/クーラー）"
          git push

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "📝 データに変更はありませんでした"
